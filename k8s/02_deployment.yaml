
apiVersion: apps/v1

kind: Deployment

metadata:

  name: petclinic

  namespace: petclinic

spec:

  replicas: 2

  selector:

    matchLabels:

      app: petclinic

  template:

    metadata:

      labels:

        app: petclinic

    spec:

      containers:

      - name: petclinic

        image: 450444046629.dkr.ecr.ap-southeast-2.amazonaws.com/user17-petclinic:v7

        imagePullPolicy: Always

        ports:

        - containerPort: 8080

        env:

        - name: MYSQL_URL

          value: jdbc:mysql://user17-db-mysql.ctkwmaky2p3u.ap-southeast-2.rds.amazonaws.com:3306/petclinic

        - name: MYSQL_USER

          value: admin

        - name: MYSQL_PASSWORD

          value: admin123!

